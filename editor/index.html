<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archipelago Puzzle Editor</title>
    <link rel="stylesheet" href="./editor.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Archipelago Puzzle Editor</h1>
            <div class="header-controls">
                <button id="saveBtn" class="btn">Save</button>
                <button id="loadBtn" class="btn">Load</button>
                <button id="exportBtn" class="btn">Export JSON</button>
                <button id="newBtn" class="btn">New Puzzle</button>
            </div>
        </header>

        <div class="main-container">
            <!-- Left panel: Constraint management -->
            <aside class="left-panel">
                <div class="panel-action-buttons">
                    <button id="showConstraintListBtn" class="btn btn-full">Add constraint</button>
                    <button id="editConstraintsBtn" class="btn-outline btn-full">Edit constraints</button>
                </div>

                <!-- Constraint type chooser (hidden by default) -->
                <div id="constraintTypePanel" style="display:none">
                    <h3>Choose type:</h3>
                    <div id="constraintList" class="constraint-list"></div>
                    <button id="cancelConstraintTypeBtn" class="btn-small cancel-btn">✕ Cancel</button>
                </div>

                <!-- Constraint parameter form (hidden by default) -->
                <div id="constraintFormPanel" class="constraint-form-panel" style="display:none">
                    <h3 id="constraintFormTitle">Configure constraint</h3>
                    <div id="constraintFormFields"></div>
                    <div class="form-actions">
                        <button id="confirmAddConstraintBtn" class="btn">Add</button>
                        <button id="cancelConstraintFormBtn" class="btn-small cancel-btn">Cancel</button>
                    </div>
                </div>

                <!-- Current puzzle constraints (hidden by default) -->
                <div id="puzzleConstraintsPanel" style="display:none">
                    <h3>Puzzle Constraints</h3>
                    <div id="puzzleConstraintsList"></div>
                </div>
            </aside>

            <!-- Center panel: Grid + below-grid sections -->
            <main class="center-panel">
                <div class="puzzle-info">
                    <div class="form-group">
                        <label>Puzzle ID: <input type="text" id="puzzleId" value="my_puzzle" placeholder="my_puzzle"></label>
                    </div>
                    <div class="form-group">
                        <label>Width: <input type="number" id="gridWidth" value="4" min="2" max="20"></label>
                        <label>Height: <input type="number" id="gridHeight" value="4" min="2" max="20"></label>
                        <button id="resizeGrid" class="btn-small">Resize</button>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="gridCanvas" width="240" height="240"></canvas>
                </div>

                <div class="tool-controls">
                    <button id="addIslandBtn" class="btn active">Add Island</button>
                    <button id="removeIslandBtn" class="btn">Remove Island</button>
                    <button id="addBridgeBtn" class="btn">Add Bridge</button>
                </div>

                <!-- Below-grid panels -->
                <div class="below-grid">
                    <section class="bridge-types-section">
                        <h2>Bridge Types</h2>
                        <div id="bridgeTypeList"></div>
                        <button id="addBridgeType" class="btn-small">+ Add Bridge Type</button>
                    </section>

                    <section class="test-solution-section">
                        <h2>Test Solution</h2>
                        <p class="test-hint">Select a bridge type, then click "Add Bridge" and click two grid cells to place a test bridge.</p>
                        <div class="test-controls">
                            <button id="validateBtn" class="btn">Validate</button>
                            <button id="clearTestBtn" class="btn-small">Clear Test</button>
                        </div>
                        <div id="validationResults"></div>
                    </section>
                </div>
            </main>
        </div>
    </div>

    <script type="module" src="./editor.js"></script>
</body>
</html>
